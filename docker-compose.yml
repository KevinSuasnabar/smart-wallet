services:
  dynamodb:
    image: amazon/dynamodb-local:2.5.4
    container_name: smart-wallet-ddb
    # -inMemory: data lives in RAM only. No SQLite file → no permission issues
    # on the Docker named volume (which caused "attempt to write a readonly
    # database" with host UID overrides on WSL2).
    # Each container restart starts with an empty DB — re-run `pnpm ddb:init`
    # to recreate the schema after restarts. Acceptable trade-off for local dev.
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    ports:
      - '8000:8000'
    working_dir: /home/dynamodblocal
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:8000/ > /dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: smart-wallet-ddb-admin
    ports:
      - '8001:8001'
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      dynamodb:
        condition: service_healthy

