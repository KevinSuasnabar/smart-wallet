service: smart-wallet-api

frameworkVersion: '3'

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs22.x
  architecture: arm64
  region: us-east-1
  # Pass --stage prod for real deployments. Default is 'local' (no JWT authorizer enforced).
  stage: ${opt:stage, 'local'}
  memorySize: 256
  timeout: 10
  logRetentionInDays: 14

  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Authorization
        - Content-Type
        - Idempotency-Key
      allowedMethods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      maxAge: 300
    # JWT authorizer: only configured for prod stage (CDK must be deployed first so SSM params exist).
    # In local stage, serverless-offline ignores JWT validation entirely — auth is handled by
    # the withAuth middleware reading X-Mock-User-Id header (IS_OFFLINE=true).
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        # Env vars are resolved at deploy time for prod. Local packaging uses placeholder values.
        issuerUrl: ${env:COGNITO_ISSUER_URL, 'https://cognito-idp.us-east-1.amazonaws.com/us-east-1_REPLACE_AFTER_CDK_DEPLOY'}
        audience:
          - ${env:COGNITO_CLIENT_ID, 'REPLACE_AFTER_CDK_DEPLOY'}

  environment:
    NODE_OPTIONS: --enable-source-maps
    IS_OFFLINE: ${env:IS_OFFLINE, 'false'}
    # AWS_REGION is RESERVED by Lambda runtime — it is auto-injected. Setting it manually fails deploy.
    # Lambda code reads process.env.AWS_REGION via the runtime injection.
    # Production deploy: TABLE_NAME and GSI1_NAME resolved from CDK SSM outputs (set as env vars
    # before sls deploy --stage prod, see Slice 14). Local: defaults to smart-wallet-local.
    TABLE_NAME: ${env:TABLE_NAME, 'smart-wallet-local'}
    GSI1_NAME: ${env:GSI1_NAME, 'GSI1'}
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, ''}
    TELEGRAM_TOKEN: ${env:TELEGRAM_TOKEN, ''}
    MY_TELEGRAM_ID: ${env:MY_TELEGRAM_ID, ''}
    BOT_USER_ID: ${env:BOT_USER_ID, ''}
    TELEGRAM_SESSIONS_TABLE: ${env:TELEGRAM_SESSIONS_TABLE, 'smart-wallet-telegram-sessions-local'}

  iam:
    role:
      statements:
        # Least-privilege DynamoDB access: table operations + GSI1 queries.
        # TABLE_ARN must be set as env var before prod deploy (read from CDK SSM output).
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:TransactWriteItems
          Resource:
            - ${env:TABLE_ARN, 'arn:aws:dynamodb:us-east-1:000000000000:table/smart-wallet-local'}
            - ${env:TABLE_ARN, 'arn:aws:dynamodb:us-east-1:000000000000:table/smart-wallet-local'}/index/GSI1
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
          Resource:
            - ${env:TELEGRAM_SESSIONS_TABLE_ARN, 'arn:aws:dynamodb:us-east-1:000000000000:table/smart-wallet-telegram-sessions-local'}

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node22
    platform: node
    format: esm
    outputFileExtension: .mjs
    banner:
      js: |
        import { createRequire } from 'module';
        const require = createRequire(import.meta.url);
    # AWS SDK is bundled (not external) so serverless-offline can execute locally.
    # In production, the full Node 22 runtime includes @aws-sdk v3 — bundling it
    # increases zip size but avoids offline-vs-prod discrepancy.
    # Revisit external: ['@aws-sdk/*'] in PR4 if cold-start performance is a concern.
    # external:
    #   - '@aws-sdk/*'
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true
    # noAuth disables all authorizers in local mode — auth handled by withAuth middleware.
    noAuth: true

package:
  individually: true

functions:
  createWallet:
    handler: src/handlers/wallet/createWallet.main
    events:
      - httpApi:
          path: /wallets
          method: post
          authorizer:
            name: cognitoJwt

  listWallets:
    handler: src/handlers/wallet/listWallets.main
    events:
      - httpApi:
          path: /wallets
          method: get
          authorizer:
            name: cognitoJwt

  getWallet:
    handler: src/handlers/wallet/getWallet.main
    events:
      - httpApi:
          path: /wallets/{walletId}
          method: get
          authorizer:
            name: cognitoJwt

  patchWallet:
    handler: src/handlers/wallet/patchWallet.main
    events:
      - httpApi:
          path: /wallets/{walletId}
          method: patch
          authorizer:
            name: cognitoJwt

  deleteWallet:
    handler: src/handlers/wallet/deleteWallet.main
    events:
      - httpApi:
          path: /wallets/{walletId}
          method: delete
          authorizer:
            name: cognitoJwt

  addTransaction:
    handler: src/handlers/transaction/addTransaction.main
    events:
      - httpApi:
          path: /wallets/{walletId}/transactions
          method: post
          authorizer:
            name: cognitoJwt

  listTransactionsByWallet:
    handler: src/handlers/transaction/listTransactionsByWallet.main
    events:
      - httpApi:
          path: /wallets/{walletId}/transactions
          method: get
          authorizer:
            name: cognitoJwt

  getTransaction:
    handler: src/handlers/transaction/getTransaction.main
    events:
      - httpApi:
          path: /wallets/{walletId}/transactions/{transactionId}
          method: get
          authorizer:
            name: cognitoJwt

  patchTransaction:
    handler: src/handlers/transaction/patchTransaction.main
    events:
      - httpApi:
          path: /wallets/{walletId}/transactions/{transactionId}
          method: patch
          authorizer:
            name: cognitoJwt

  deleteTransaction:
    handler: src/handlers/transaction/deleteTransaction.main
    events:
      - httpApi:
          path: /wallets/{walletId}/transactions/{transactionId}
          method: delete
          authorizer:
            name: cognitoJwt

  listTransactionsByCategory:
    handler: src/handlers/transaction/listTransactionsByCategory.main
    events:
      - httpApi:
          path: /transactions
          method: get
          authorizer:
            name: cognitoJwt

  listCategories:
    handler: src/handlers/category/listCategories.main
    events:
      - httpApi:
          path: /categories
          method: get
          authorizer:
            name: cognitoJwt

  createCustomCategory:
    handler: src/handlers/category/createCustomCategory.main
    events:
      - httpApi:
          path: /categories
          method: post
          authorizer:
            name: cognitoJwt

  patchCategory:
    handler: src/handlers/category/patchCategory.main
    events:
      - httpApi:
          path: /categories/{categoryId}
          method: patch
          authorizer:
            name: cognitoJwt

  deleteCategory:
    handler: src/handlers/category/deleteCategory.main
    events:
      - httpApi:
          path: /categories/{categoryId}
          method: delete
          authorizer:
            name: cognitoJwt

  # ── Recurring transactions (monthly) ────────────────────────────────────
  # NOTE: the static `/recurring/materialize` route MUST stay listed before
  # `/recurring/{recurringId}` so APIGW v2 prefers the exact match. As a
  # defensive measure, getRecurring's path schema validates UUIDv4 and
  # would return 400 if "materialize" ever reached it.

  materializeRecurrings:
    handler: src/handlers/recurring/materializeRecurrings.main
    events:
      - httpApi:
          path: /recurring/materialize
          method: post
          authorizer:
            name: cognitoJwt

  createRecurring:
    handler: src/handlers/recurring/createRecurring.main
    events:
      - httpApi:
          path: /recurring
          method: post
          authorizer:
            name: cognitoJwt

  listRecurring:
    handler: src/handlers/recurring/listRecurring.main
    events:
      - httpApi:
          path: /recurring
          method: get
          authorizer:
            name: cognitoJwt

  getRecurring:
    handler: src/handlers/recurring/getRecurring.main
    events:
      - httpApi:
          path: /recurring/{recurringId}
          method: get
          authorizer:
            name: cognitoJwt

  patchRecurring:
    handler: src/handlers/recurring/patchRecurring.main
    events:
      - httpApi:
          path: /recurring/{recurringId}
          method: patch
          authorizer:
            name: cognitoJwt

  deleteRecurring:
    handler: src/handlers/recurring/deleteRecurring.main
    events:
      - httpApi:
          path: /recurring/{recurringId}
          method: delete
          authorizer:
            name: cognitoJwt

  getLinkStatus:
    handler: src/handlers/telegram/getLinkStatus.main
    events:
      - httpApi:
          path: /telegram/link-status
          method: get
          authorizer:
            name: cognitoJwt

  generateLinkToken:
    handler: src/handlers/telegram/generateLinkToken.main
    events:
      - httpApi:
          path: /telegram/link-token
          method: post
          authorizer:
            name: cognitoJwt

  processBotMessage:
    handler: src/handlers/telegram/processBotMessage.handler
    timeout: 30
    events:
      - httpApi:
          path: /telegram/process-bot-message
          method: post
